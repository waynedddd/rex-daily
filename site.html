<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rex Site Pick — 每日一站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --bg: #0a0a0a;
      --accent: #c4a84e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #f5f0e8;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo { font-size: 18px; letter-spacing: -0.01em; opacity: 0.7; }
    .logo a { color: inherit; text-decoration: none; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .ctrl-btn {
      background: none; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); font-family: var(--font);
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      transition: all 0.3s; text-decoration: none; display: inline-block;
    }
    .ctrl-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
    .ctrl-btn.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }

    /* ── Main layout ── */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px 40px;
    }

    /* ── Pick label ── */
    .pick-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s forwards;
    }

    .pick-date {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      opacity: 0.25;
      margin-bottom: 24px;
      animation: fadeUp 0.8s 0.15s forwards;
      opacity: 0;
    }

    /* ── Cover image ── */
    .pick-cover-wrap {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .pick-cover-wrap:hover { transform: translateY(-4px); }

    .pick-cover {
      width: 100%;
      display: block;
      transition: transform 0.6s ease;
    }

    .pick-cover-wrap:hover .pick-cover {
      transform: scale(1.02);
    }

    /* Browser-style frame */
    .pick-frame {
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    .pick-frame-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .pick-frame-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .pick-frame-url {
      flex: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      opacity: 0.25;
      letter-spacing: 0.05em;
    }

    /* ── Text content ── */
    .pick-name {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s forwards;
    }

    .pick-tagline {
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 300;
      line-height: 1.5;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s forwards;
    }

    .pick-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s 0.4s forwards;
    }

    .pick-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    .pick-visit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-decoration: none;
      color: var(--accent);
      border: 1px solid rgba(196,168,78,0.3);
      padding: 10px 24px;
      border-radius: 999px;
      transition: all 0.4s;
      opacity: 0;
      animation: fadeUp 0.8s 0.45s forwards;
    }

    .pick-visit:hover {
      background: rgba(196,168,78,0.1);
      border-color: rgba(196,168,78,0.6);
      transform: translateY(-2px);
    }

    .pick-visit::after { content: '→'; transition: transform 0.3s; }
    .pick-visit:hover::after { transform: translateX(4px); }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 48px 0;
    }

    /* ── Rex Take ── */
    .rex-section {
      margin-bottom: 48px;
    }

    .rex-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .rex-header-icon { font-size: 18px; }

    .rex-header-label {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.4;
    }

    .rex-body {
      font-size: 16px;
      line-height: 1.9;
      color: rgba(255,255,255,0.55);
    }

    /* ── Archive ── */
    .archive {
      margin-top: 16px;
    }

    .archive-header {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      opacity: 0.2;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .archive-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
    }

    .archive-item:hover { padding-left: 8px; }
    .archive-item:hover .archive-name { color: rgba(255,255,255,0.9); }

    .archive-thumb {
      width: 48px;
      height: 32px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      filter: grayscale(60%) brightness(0.8);
      transition: filter 0.4s;
    }

    .archive-item:hover .archive-thumb { filter: grayscale(0%) brightness(1); }

    .archive-date {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0.2;
      flex-shrink: 0;
      width: 72px;
    }

    .archive-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      flex: 1;
      color: rgba(255,255,255,0.65);
      transition: color 0.3s;
    }

    .archive-cat {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.15;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 12px;
      opacity: 0.15;
      font-family: var(--font-mono);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 200px 24px;
      font-size: 14px;
      opacity: 0.3;
      font-family: var(--font-mono);
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .topbar { padding: 10px 16px; }
      .logo { font-size: 16px; }
      .ctrl-btn { font-size: 10px; padding: 5px 10px; letter-spacing: 0.08em; }
      .main { padding: 64px 16px 32px; }
      .pick-frame-bar { padding: 8px 12px; }
      .pick-frame-dot { width: 6px; height: 6px; }
      .archive-thumb { width: 40px; height: 28px; }
      .archive-date { width: 60px; font-size: 10px; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo"><a href="index.html">Rex Daily</a></div>
    <div class="controls">
      <a href="index.html" class="ctrl-btn">Daily</a>
      <a href="inspire.html" class="ctrl-btn">Inspire</a>
      <a href="site.html" class="ctrl-btn active">Site Pick</a>
      <button class="ctrl-btn" data-lang="true" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div class="main" id="app">
    <div class="loading">Loading...</div>
  </div>

  <div class="footer">Rex Site Pick — curated by 🔍 Rex</div>

  <script>
    let data = null;
    let currentLang = localStorage.getItem('rex-lang') || 'zh';

    document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('rex-lang', currentLang);
      document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';
      render();
    }

    function t(obj) {
      if (!obj) return '';
      if (typeof obj === 'string') return obj;
      return obj[currentLang] || obj['zh'] || obj['en'] || '';
    }

    function getDomain(url) {
      try { return new URL(url).hostname; } catch(e) { return url; }
    }

    function render() {
      if (!data || !data.picks || !data.picks.length) {
        document.getElementById('app').innerHTML = '<div class="loading">暂无推荐</div>';
        return;
      }

      const sorted = [...data.picks].sort((a, b) => b.date.localeCompare(a.date));
      const today = sorted[0];
      const archive = sorted.slice(1);

      const visitLabel = currentLang === 'zh' ? '访问网站' : 'Visit Site';
      const archiveLabel = currentLang === 'zh' ? '往期推荐' : 'Past Picks';

      let html = `
        <div class="pick-label">🔍 Rex's Site Pick</div>
        <div class="pick-date">${today.date}</div>

        ${today.cover ? `
        <div class="pick-cover-wrap" onclick="window.open('${today.url}','_blank')">
          <div class="pick-frame">
            <div class="pick-frame-bar">
              <span class="pick-frame-dot"></span>
              <span class="pick-frame-dot"></span>
              <span class="pick-frame-dot"></span>
              <span class="pick-frame-url">${getDomain(today.url)}</span>
            </div>
            <img class="pick-cover" src="${today.cover}" alt="${today.name}" referrerpolicy="no-referrer">
          </div>
        </div>
        ` : ''}

        <h1 class="pick-name">${today.name}</h1>
        <p class="pick-tagline">${t(today.tagline)}</p>

        <div class="pick-tags">
          ${(today.tags || []).map(tag => `<span class="pick-tag">${tag}</span>`).join('')}
        </div>

        <a class="pick-visit" href="${today.url}" target="_blank" rel="noopener">${visitLabel}</a>

        <div class="divider"></div>

        <div class="rex-section">
          <div class="rex-header">
            <span class="rex-header-icon">🔍</span>
            <span class="rex-header-label">Rex's Take</span>
          </div>
          <div class="rex-body">${t(today.rex_take)}</div>
        </div>
      `;

      if (archive.length) {
        html += `
          <div class="archive">
            <div class="archive-header">${archiveLabel}</div>
            ${archive.map(pick => `
              <a class="archive-item" href="${pick.url}" target="_blank" rel="noopener" title="${t(pick.tagline)}">
                ${pick.cover ? `<img class="archive-thumb" src="${pick.cover}" alt="" referrerpolicy="no-referrer">` : ''}
                <span class="archive-date">${pick.date}</span>
                <span class="archive-name">${pick.name}</span>
                <span class="archive-cat">${pick.category || ''}</span>
              </a>
            `).join('')}
          </div>
        `;
      }

      document.getElementById('app').innerHTML = html;
    }

    fetch('sites.json?' + Date.now())
      .then(r => r.json())
      .then(d => { data = d; render(); })
      .catch(e => {
        document.getElementById('app').innerHTML = '<div class="loading">Failed to load. ' + e.message + '</div>';
      });
  </script>

</body>
</html>
