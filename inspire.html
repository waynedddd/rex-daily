<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rex Inspire — Moodboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --bg: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #f5f0e8;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .logo { font-size: 18px; letter-spacing: -0.01em; opacity: 0.7; }
    .logo a { color: inherit; text-decoration: none; }
    .controls { display: flex; gap: 8px; align-items: center; }
    .ctrl-btn {
      background: none; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); font-family: var(--font);
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      transition: all 0.3s; text-decoration: none; display: inline-block;
    }
    .ctrl-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
    .ctrl-btn.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }

    /* ── Dropdown nav ── */
    .nav-drop { position: relative; display: inline-block; }
    .nav-drop-btn {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85); font-family: var(--font); font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.15em; padding: 6px 14px;
      border-radius: 999px; cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-drop-btn::after { content: '▾'; font-size: 10px; opacity: 0.5; transition: transform 0.3s; }
    .nav-drop.open .nav-drop-btn::after, .nav-drop:hover .nav-drop-btn::after { transform: rotate(180deg); }
    .nav-drop-btn:hover { border-color: rgba(255,255,255,0.4); }
    .nav-drop-menu {
      position: absolute; top: calc(100% + 6px); right: 0; min-width: 180px;
      background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 4px;
      opacity: 0; transform: translateY(-4px); pointer-events: none;
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 300;
    }
    .nav-drop.open .nav-drop-menu, .nav-drop:hover .nav-drop-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .nav-drop-item {
      display: block; width: 100%; padding: 8px 14px;
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-family: var(--font); font-size: 12px; text-align: left;
      cursor: pointer; border-radius: 6px; transition: all 0.2s; text-decoration: none;
    }
    .nav-drop-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .nav-drop-item.active { color: #fff; background: rgba(255,255,255,0.08); }
    .nav-drop-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    /* ── Section header ── */
    .board-section {
      padding: 0 8px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .board-section:first-child { padding-top: 64px; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 48px 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 16px;
    }

    .board-section:first-child .section-header { padding-top: 8px; }

    .section-name {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .section-count {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0.25;
    }

    /* ── Moodboard ── */
    .moodboard {
      padding: 64px 8px 60px;
      columns: 4;
      column-gap: 6px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 1100px) { .moodboard { columns: 3; } }
    @media (max-width: 720px) { .moodboard { columns: 2; column-gap: 4px; } }

    /* ── Tile ── */
    .tile {
      break-inside: avoid;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .tile:hover { transform: scale(1.015); z-index: 10; }

    .tile img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
    }

    .tile:hover img { transform: scale(1.03); }

    /* Overlay on hover */
    .tile-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 32px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 70%, transparent 100%);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .tile:hover .tile-overlay { opacity: 1; }

    .tile-direction {
      font-family: var(--font-mono);
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 4px;
      opacity: 0.6;
    }

    .tile-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    /* ── Rex Note tile (no image) ── */
    .tile--rex {
      background: rgba(227,51,51,0.08);
      border: 1px solid rgba(227,51,51,0.15);
      padding: 24px 20px;
    }

    .tile--rex .rex-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #e33;
      margin-bottom: 10px;
    }

    .tile--rex .rex-body {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.65;
      font-style: italic;
    }

    .tile--rex:hover {
      background: rgba(227,51,51,0.12);
      border-color: rgba(227,51,51,0.25);
    }

    /* ── Section divider tile ── */
    .tile--section {
      padding: 32px 20px;
      text-align: center;
    }

    .tile--section h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .tile--section .section-count {
      font-family: var(--font-mono);
      font-size: 11px;
      opacity: 0.3;
    }

    /* ── Detail modal ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      pointer-events: none;
      transition: all 0.5s ease;
    }

    .modal-bg.open {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 301;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .modal.open {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .modal img {
      width: 100%;
      display: block;
      border-radius: 8px 8px 0 0;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-direction {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .modal-text {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.6;
      margin-bottom: 16px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .modal-tag {
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 3px 10px;
      border-radius: 2px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.4);
    }

    .modal-link {
      display: inline-block;
      font-size: 12px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
    }

    .modal-link:hover {
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.9);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      z-index: 5;
    }

    .modal-close:hover { background: rgba(0,0,0,0.9); color: #fff; }

    .modal-date {
      font-family: var(--font-mono);
      font-size: 10px;
      opacity: 0.25;
      margin-top: 12px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 40px 24px;
      font-size: 12px;
      opacity: 0.15;
      font-family: var(--font-mono);
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 200px 24px;
      font-size: 14px;
      opacity: 0.3;
      font-family: var(--font-mono);
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo"><a href="index.html">Rex Daily</a></div>
    <div class="controls">
      <a href="index.html" class="ctrl-btn">Daily</a>
      <div class="nav-drop" id="nav-inspire">
        <button class="nav-drop-btn" onclick="this.parentElement.classList.toggle('open')">
          <span id="drop-label">Inspire</span>
        </button>
        <div class="nav-drop-menu" id="subnav"></div>
      </div>
      <button class="ctrl-btn" data-lang="true" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div id="boards">
    <div class="loading">Loading...</div>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalContent"></div>
  </div>

  <div class="footer">Rex Inspire — curated by 🔍 Rex</div>

  <script>
    let allData = null;
    let currentFilter = 'all';
    let currentLang = localStorage.getItem('rex-lang') || 'zh';

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('rex-lang', currentLang);
      document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';
      document.getElementById('drop-label').textContent = currentFilter === 'all' ? (currentLang === 'en' ? 'All Topics' : '全部') : getDirName(currentFilter);
      render();
    }

    // Init lang button
    document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';

    function filterDir(dir, el) {
      currentFilter = dir;
      document.querySelectorAll('#subnav .nav-drop-item').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      // Update button label
      const label = dir === 'all' ? (currentLang === 'en' ? 'All Topics' : '全部') : getDirName(dir);
      document.getElementById('drop-label').textContent = label;
      // Close dropdown
      document.getElementById('nav-inspire').classList.remove('open');
      render();
    }

    function getDirColor(id) {
      if (!allData) return '#fff';
      const d = allData.directions.find(d => d.id === id);
      return d ? d.color : '#fff';
    }

    function getDirName(id) {
      if (!allData) return '';
      const d = allData.directions.find(d => d.id === id);
      if (!d) return '';
      return (currentLang === 'en' && d.name_en) ? d.name_en : d.name;
    }

    function t(pin, field) {
      if (currentLang === 'en' && pin[field + '_en']) return pin[field + '_en'];
      return pin[field] || '';
    }

    // Global pin index for modal
    let flatPins = [];

    function render() {
      if (!allData) return;
      const container = document.getElementById('boards');
      flatPins = [];

      const dirs = currentFilter === 'all'
        ? allData.directions
        : allData.directions.filter(d => d.id === currentFilter);

      let html = '';

      dirs.forEach(dir => {
        const pins = allData.pins
          .filter(p => p.direction === dir.id)
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        const imgPins = pins.filter(p => p.type !== 'rex-note' && p.image);
        const rexNotes = pins.filter(p => p.type === 'rex-note');

        html += `<div class="board-section">`;
        html += `<div class="section-header">
          <h2 class="section-name" style="color:${dir.color}">${(currentLang === 'en' && dir.name_en) ? dir.name_en : dir.name}</h2>
          <span class="section-count">${imgPins.length} shots</span>
        </div>`;
        html += `<div class="moodboard">`;

        imgPins.forEach(pin => {
          const globalIdx = flatPins.length;
          flatPins.push(pin);

          html += `<div class="tile" onclick="openModal(${globalIdx})">
            <img src="${pin.image}" alt="${pin.title || ''}" loading="lazy"
                 onerror="this.parentElement.style.display='none'">
            <div class="tile-overlay">
              <div class="tile-title">${pin.title || ''}</div>
            </div>
          </div>`;
        });

        // Insert rex notes as text tiles
        rexNotes.forEach(pin => {
          html += `<div class="tile tile--rex">
            <div class="rex-label">🔍 Rex's Take</div>
            <div class="rex-body">${t(pin,"body")}</div>
          </div>`;
        });

        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    function openModal(idx) {
      const pin = flatPins[idx];
      if (!pin) return;

      const color = getDirColor(pin.direction);
      const dirName = getDirName(pin.direction);
      const typeLabels = { trend: 'Trend', case: 'Case', direction: 'Direction', product: 'Product' };

      let content = '';
      if (pin.image) content += `<img src="${pin.image}" alt="">`;
      content += `<div class="modal-body">`;
      content += `<div class="modal-direction" style="color:${color}">${dirName} · ${typeLabels[pin.type] || pin.type}</div>`;
      content += `<div class="modal-title" style="color:${color}">${pin.title || ''}</div>`;
      content += `<div class="modal-text">${t(pin,'body')}</div>`;
      if (pin.tags && pin.tags.length) {
        content += '<div class="modal-tags">' + pin.tags.map(t => `<span class="modal-tag">${t}</span>`).join('') + '</div>';
      }
      if (pin.link) {
        content += `<a class="modal-link" href="${pin.link}" target="_blank" style="border-color:${color}40;color:${color}">${pin.linkText || 'Source'} →</a>`;
      }
      content += `<div class="modal-date">${pin.date || ''}</div>`;
      content += '</div>';

      document.getElementById('modalContent').innerHTML = content;
      document.getElementById('modal').classList.add('open');
      document.getElementById('modalBg').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('modalBg').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    document.addEventListener('click', e => {
      const drop = document.getElementById('nav-inspire');
      if (drop && !drop.contains(e.target)) drop.classList.remove('open');
    });

    function buildSubnav(data) {
      const sub = document.getElementById('subnav');
      let html = '<button class="nav-drop-item active" onclick="filterDir(\'all\',this)">All Topics</button>';
      data.directions.forEach(d => {
        html += `<button class="nav-drop-item" onclick="filterDir('${d.id}',this)"><span class="nav-drop-dot" style="background:${d.color}"></span>${d.name}</button>`;
      });
      sub.innerHTML = html;
    }

    fetch('inspire.json?' + Date.now())
      .then(r => r.json())
      .then(data => {
        allData = data;
        buildSubnav(data);
        render();
      })
      .catch(e => {
        document.getElementById('board').innerHTML = '<div class="loading">Failed to load. ' + e.message + '</div>';
      });
  </script>

</body>
</html>
