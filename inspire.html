<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rex Inspire — Design Research Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
      --bg: #0a0a0a;
      --paper: #f5f0e8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--paper);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .logo { font-size: 18px; letter-spacing: -0.01em; opacity: 0.7; }
    .logo a { color: inherit; text-decoration: none; }

    .controls { display: flex; gap: 8px; align-items: center; }

    .ctrl-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: var(--font);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .ctrl-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
    .ctrl-btn.active { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }

    /* ── Nav group (expandable pill) ── */
    .nav-group {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .nav-group .nav-main {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      font-family: var(--font);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-group .nav-sub {
      display: inline-flex;
      max-width: 0;
      overflow: hidden;
      transition: max-width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .nav-group.expanded .nav-sub { max-width: 400px; }
    .nav-group .nav-sub button,
    .nav-group .nav-sub a {
      background: none;
      border: none;
      border-left: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.4);
      font-family: var(--font);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .nav-group .nav-sub button:hover,
    .nav-group .nav-sub a:hover { color: rgba(255,255,255,0.7); }
    .nav-group .nav-sub button.active,
    .nav-group .nav-sub a.active { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.06); }

    /* ── Hero ── */
    .hero {
      padding: 80px 24px 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin-bottom: 16px;
    }
    .hero h1 span {
      display: block;
      font-size: 0.4em;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-bottom: 12px;
    }
    .hero p { font-size: 16px; opacity: 0.5; max-width: 500px; line-height: 1.6; }

    /* ── Direction sections ── */
    .direction { padding: 60px 24px 80px; }

    .direction-header {
      max-width: 900px;
      margin: 0 auto 48px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 20px;
    }
    .direction-label {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 700;
    }
    .direction-title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
    .direction-count { font-size: 13px; opacity: 0.3; font-family: var(--font-mono); }

    /* ── Trend bar ── */
    .trend-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 40px;
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .trend-item { flex: 1; min-width: 200px; }
    .trend-number { font-size: 48px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; }
    .trend-label { font-size: 13px; opacity: 0.4; margin-top: 4px; line-height: 1.4; }

    /* ── Board ── */
    .board {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) { .board { grid-template-columns: 1fr; } }

    /* ── Pin Card ── */
    .pin {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: default;
    }
    .pin::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      transform: translateX(-50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 6px rgba(255,255,255,0.1);
      z-index: 2;
    }
    .pin:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-4px) rotate(0deg) !important;
      z-index: 10;
    }
    .pin:nth-child(odd) { transform: rotate(-0.8deg); }
    .pin:nth-child(even) { transform: rotate(0.6deg); }
    .pin:nth-child(3n) { transform: rotate(-1.2deg); }
    .pin:nth-child(3n+1) { transform: rotate(0.4deg); }

    /* Pin image */
    .pin-image {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      filter: saturate(0.7) brightness(0.85);
      transition: filter 0.5s ease;
    }
    .pin:hover .pin-image {
      filter: saturate(1) brightness(1);
    }

    .pin-content { padding: 20px; }

    .pin-type {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.35;
      margin-bottom: 10px;
    }
    .pin-date {
      font-family: var(--font-mono);
      font-size: 10px;
      opacity: 0.25;
      float: right;
    }
    .pin-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .pin-body {
      font-size: 13px;
      line-height: 1.65;
      opacity: 0.55;
      margin-bottom: 14px;
    }
    .pin-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .pin-tag {
      font-size: 10px;
      font-family: var(--font-mono);
      padding: 2px 8px;
      border-radius: 2px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
    }
    .pin-link {
      display: inline-block;
      font-size: 11px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-decoration: none;
      opacity: 0.4;
      transition: opacity 0.3s;
      border-bottom: 1px solid transparent;
    }
    .pin-link:hover { opacity: 1; border-bottom-color: currentColor; }

    /* Hero pin */
    .pin--hero { grid-column: span 2; }
    .pin--hero .pin-image { aspect-ratio: 21/10; }
    .pin--hero .pin-title { font-size: 22px; }
    @media (max-width: 768px) { .pin--hero { grid-column: span 1; } .pin--hero .pin-image { aspect-ratio: 16/10; } }

    /* Rex note */
    .pin--rex {
      background: rgba(227,51,51,0.06);
      border: 1px solid rgba(227,51,51,0.15);
    }
    .pin--rex::before { background: #e33; box-shadow: 0 0 8px rgba(227,51,51,0.4); }
    .pin--rex .pin-body { font-style: italic; opacity: 0.65; }
    .pin--rex:hover { background: rgba(227,51,51,0.08); }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 60px 24px;
      font-size: 12px;
      opacity: 0.2;
      font-family: var(--font-mono);
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 120px 24px;
      font-size: 14px;
      opacity: 0.3;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo"><a href="index.html">Rex Daily</a></div>
    <div class="controls">
      <a href="index.html" class="ctrl-btn">Daily</a>
      <div class="nav-group expanded" id="nav-inspire">
        <span class="nav-main" onclick="toggleNav('nav-inspire')">Inspire</span>
        <div class="nav-sub">
          <button class="active" onclick="filterDirection('all',this)">All</button>
        </div>
      </div>
    </div>
  </div>

  <div class="hero">
    <h1>
      <span>Design Research Wall</span>
      Inspire
    </h1>
    <p>AI 正在重塑每个行业的设计语言。这里收集前沿案例、趋势信号和值得关注的方向。钉在墙上，随时回看。</p>
  </div>

  <div id="content">
    <div class="loading">Loading pins...</div>
  </div>

  <div class="footer">
    Rex Inspire — curated by 🔍 Rex
  </div>

  <script>
    function toggleNav(id) {
      document.getElementById(id).classList.toggle('expanded');
    }

    let allData = null;
    let currentFilter = 'all';

    function filterDirection(dir, el) {
      currentFilter = dir;
      document.querySelectorAll('.nav-sub button').forEach(b => b.classList.remove('active'));
      if (el) el.classList.add('active');
      render();
    }

    function render() {
      if (!allData) return;
      const container = document.getElementById('content');
      let html = '';

      const dirs = currentFilter === 'all'
        ? allData.directions
        : allData.directions.filter(d => d.id === currentFilter);

      dirs.forEach(dir => {
        const pins = allData.pins
          .filter(p => p.direction === dir.id)
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

        html += `<div class="direction direction--${dir.id}">`;
        html += `<div class="direction-header">
          <span class="direction-label" style="color:${dir.color};border:1px solid ${dir.color}">${dir.label}</span>
          <h2 class="direction-title">${dir.name}</h2>
          <span class="direction-count">${pins.length} pins</span>
        </div>`;

        // Stats
        if (dir.stats && dir.stats.length) {
          html += '<div class="trend-bar">';
          dir.stats.forEach(s => {
            html += `<div class="trend-item">
              <div class="trend-number" style="color:${dir.color}">${s.number}</div>
              <div class="trend-label">${s.label}</div>
            </div>`;
          });
          html += '</div>';
        }

        // Board
        html += '<div class="board">';
        pins.forEach((pin, i) => {
          if (pin.type === 'rex-note') {
            html += `<div class="pin pin--rex" style="transform:rotate(${(i%3-1)*0.8}deg)">
              <div class="pin-content">
                <div class="pin-type">🔍 Rex's Take</div>
                <div class="pin-date">${pin.date || ''}</div>
                <div class="pin-body">${pin.body}</div>
              </div>
            </div>`;
            return;
          }

          const heroClass = pin.hero ? ' pin--hero' : '';
          const imgHtml = pin.image
            ? `<img class="pin-image" src="${pin.image}" alt="${pin.title || ''}" loading="lazy" onerror="this.style.display='none'">`
            : '';
          const tagsHtml = (pin.tags || []).map(t => `<span class="pin-tag">${t}</span>`).join('');
          const linkHtml = pin.link
            ? `<a class="pin-link" href="${pin.link}" target="_blank" style="color:${dir.color}">${pin.linkText || 'Link'} →</a>`
            : '';

          const typeLabels = { trend: '趋势 / Trend', case: '案例 / Case', direction: '方向 / Direction', product: '产品 / Product' };

          html += `<div class="pin${heroClass}" style="transform:rotate(${((i*7+3)%5-2)*0.5}deg)">
            ${imgHtml}
            <div class="pin-content">
              <div class="pin-type">${typeLabels[pin.type] || pin.type}</div>
              <div class="pin-date">${pin.date || ''}</div>
              <div class="pin-title" style="color:${dir.color}">${pin.title}</div>
              <div class="pin-body">${pin.body}</div>
              <div class="pin-tags">${tagsHtml}</div>
              ${linkHtml}
            </div>
          </div>`;
        });
        html += '</div></div>';
      });

      container.innerHTML = html;
    }

    // Build subnav from data
    function buildSubnav(data) {
      const sub = document.querySelector('#nav-inspire .nav-sub');
      let btns = '<button class="active" onclick="filterDirection(\'all\',this)">All</button>';
      data.directions.forEach(d => {
        btns += `<button onclick="filterDirection('${d.id}',this)">${d.name}</button>`;
      });
      sub.innerHTML = btns;
    }

    // Load
    fetch('inspire.json?' + Date.now())
      .then(r => r.json())
      .then(data => {
        allData = data;
        buildSubnav(data);
        render();
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<div class="loading">Failed to load pins.</div>';
      });
  </script>

</body>
</html>
