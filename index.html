<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Rex Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-dim: #999;
      --border: #e5e5e5;
      --red: #e33;
      --font-display: 'DM Serif Display', 'Noto Serif SC', serif;
      --font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      --label: 0.82rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Menu ── */
    .menu {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .menu-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px 16px;
      gap: 24px;
    }

    .menu-left {
      display: flex;
      align-items: center;
      gap: 24px;
      flex: 1;
    }

    .menu-logo {
      font-family: var(--font-display);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
      cursor: pointer;
    }

    .menu-links {
      display: flex;
      gap: 16px;
    }

    .menu-link {
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: var(--label);
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .menu-link.active { color: var(--text); }
    .menu-link:hover { color: var(--text); }

    .menu-right {
      display: flex;
      gap: 8px;
    }

    .lang-link {
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: var(--label);
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .lang-link.active { color: var(--text); }

    /* ── Card Grid ── */
    .card-group {
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--border);
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
      overflow: hidden;
      max-width: 100%;
    }

    .card:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .card:hover .card-label { color: #fff; }
    .card:hover .card-date { color: rgba(255,255,255,0.7); }
    .card:hover .card-tag { background: rgba(255,255,255,0.2); color: #fff; }
    .card:hover .card-preview { color: rgba(255,255,255,0.7); }
    .card:hover .card-img { filter: grayscale(0%); }

    .card-label {
      font-size: var(--label);
      text-transform: uppercase;
      padding: 12px 12px 0;
      color: var(--text);
      z-index: 1;
      line-height: 1.3;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      flex: 1;
    }

    /* Card types */
    .card--hero {
      width: 480px;
      min-height: 320px;
    }

    .card--media {
      width: 380px;
    }

    .card--text {
      width: 420px;
    }

    .card--wide {
      width: 540px;
    }

    .card--accent {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .card--accent .card-label { color: #fff; }
    .card--accent:hover { background: var(--red); }

    /* Card image */
    .card-img-wrap {
      width: 100%;
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      display: block;
      mix-blend-mode: multiply;
      filter: grayscale(100%);
      transition: filter 2s ease-out, opacity 0.3s;
      opacity: 1;
    }

    /* Card title (serif display) */
    .card-title {
      font-family: var(--font-display);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 400;
      line-height: 1.2;
      width: 100%;
    }

    .card-title em { font-style: italic; }

    /* Card excerpt text */
    .card-excerpt {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.6;
      width: 100%;
      color: var(--text-muted);
    }

    .card:hover .card-excerpt { color: rgba(255,255,255,0.8); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 8px;
    }

    .card-date {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }

    .card-tag.design { background: rgba(196,168,78,0.12); color: #a08930; }
    .card-tag.tech { background: rgba(74,138,158,0.12); color: #3d7a8e; }

    .card-preview {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    /* ── Expanded overlay ── */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }

    .overlay.open { display: flex; }

    .overlay-card {
      background: #fff;
      color: var(--text);
      max-width: 720px;
      width: 100%;
      position: relative;
      animation: fadeUp 0.3s ease-out;
    }

    .overlay-close {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: flex-end;
      padding: 12px;
      background: #fff;
      z-index: 1;
    }

    .overlay-close button {
      background: var(--text);
      color: #fff;
      border: none;
      font-family: var(--font-body);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .overlay-close button:hover { background: var(--red); }

    .overlay-header {
      padding: 0 12px 12px;
    }

    .overlay-header .card-meta { margin-bottom: 8px; }

    .overlay-title {
      font-family: var(--font-display);
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 400;
      line-height: 1.15;
    }

    .overlay-cover {
      width: 100%;
      display: block;
    }

    .overlay-body {
      padding: 24px 12px 32px;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text-muted);
    }

    .overlay-body h3 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      margin: 2rem 0 0.75rem;
    }

    .overlay-body h3:first-child { margin-top: 0; }
    .overlay-body p { margin-bottom: 0.75rem; }
    .overlay-body ul { padding-left: 1.25rem; margin-bottom: 1rem; }
    .overlay-body li { margin-bottom: 0.5rem; }
    .overlay-body strong { font-weight: 500; color: var(--text); }

    .overlay-body a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--border);
      transition: text-decoration-color 0.2s;
    }

    .overlay-body a:hover { text-decoration-color: var(--text); }

    .overlay-body small { font-size: 12px; color: var(--text-dim); }
    .overlay-body small a { color: var(--text-dim); }

    .overlay-body > img,
    .overlay-body li img,
    .overlay-body p img,
    .overlay-body ul img { display: none; }

    /* Rex take in overlay */
    .overlay-body .rex-take {
      background: var(--text);
      color: #fff;
      padding: 24px;
      margin-top: 2rem;
    }

    .overlay-body .rex-take h3 { color: #fff; margin-top: 0; }
    .overlay-body .rex-take p { color: rgba(255,255,255,0.85); }

    /* Source cards in overlay */
    .overlay-sources {
      padding: 0 12px 32px;
    }

    .overlay-sources-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .source-card {
      display: flex;
      gap: 12px;
      border: 1px solid var(--border);
      padding: 8px;
      margin-bottom: 8px;
      align-items: center;
      transition: all 0.2s;
      text-decoration: none !important;
    }

    .source-card:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .source-card:hover .source-domain { color: rgba(255,255,255,0.7); }
    .source-card:hover .source-title { color: #fff; }
    .source-card:hover .source-img { filter: grayscale(0%); }

    .source-img {
      width: 80px;
      height: 56px;
      object-fit: cover;
      flex-shrink: 0;
      filter: grayscale(100%);
      mix-blend-mode: multiply;
      transition: filter 2s ease-out;
    }

    .source-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .source-domain {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── Footer ── */
    .footer {
      padding: 32px 16px;
      display: flex;
      justify-content: space-between;
      font-size: var(--label);
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .footer-logo {
      font-family: var(--font-display);
      color: var(--text);
      font-size: 1rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .card-group { padding: 8px; gap: 8px; }
      .card--hero, .card--media, .card--text, .card--wide {
        width: 100% !important;
      }
      .menu-inner { flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
      .menu-left { width: 100%; justify-content: space-between; }
      .menu-right { width: 100%; justify-content: flex-end; }
      .overlay { padding: 0; }
      .overlay-card { max-width: 100%; min-height: 100vh; }
      .footer { flex-direction: column; gap: 8px; padding: 24px 12px; }
    }
  </style>
</head>
<body>

  <div class="menu">
    <div class="menu-inner">
      <div class="menu-left">
        <div class="menu-logo" onclick="setSection('all')">Rex Daily</div>
        <nav class="menu-links" id="section-toggle">
          <button class="menu-link active" data-section="all" onclick="setSection('all')">Index</button>
          <button class="menu-link" data-section="design" onclick="setSection('design')">Design</button>
          <button class="menu-link" data-section="tech" onclick="setSection('tech')">Tech</button>
        </nav>
      </div>
      <div class="menu-right">
        <button class="lang-link active" data-lang="zh" onclick="setLang('zh')">中文</button>
        <button class="lang-link" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>

  <div class="card-group" id="cards"></div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeOverlay()">
    <div class="overlay-card" id="overlay-card"></div>
  </div>

  <footer class="footer">
    <div class="footer-logo">Rex Daily</div>
    <div>© 2026 · Curated by Rex</div>
  </footer>

  <script>
    let currentLang = localStorage.getItem('rex-lang') || 'zh';
    let currentSection = localStorage.getItem('rex-section') || 'all';
    let issuesData = [];

    const widths = ['480px','380px','420px','540px','360px','440px'];
    const i18n = {
      zh: { expand: '展开 →', sources: '相关来源' },
      en: { expand: 'Read →', sources: 'Sources' }
    };

    function setSection(s) {
      currentSection = s;
      localStorage.setItem('rex-section', s);
      document.querySelectorAll('#section-toggle .menu-link').forEach(b =>
        b.classList.toggle('active', b.dataset.section === s));
      render();
    }

    function setLang(l) {
      currentLang = l;
      localStorage.setItem('rex-lang', l);
      document.querySelectorAll('[data-lang]').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === l));
      document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
      render();
    }

    function getField(f) {
      if (typeof f === 'string') return f;
      return f[currentLang] || f['zh'] || f['en'] || '';
    }

    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.',''); } catch(e) { return ''; }
    }

    function getExcerpt(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      const text = tmp.textContent || '';
      return text.substring(0, 120) + (text.length > 120 ? '…' : '');
    }

    function openOverlay(idx) {
      const issue = issuesData[idx];
      if (!issue) return;
      const sec = issue.section || 'design';
      const coverHtml = issue.cover
        ? '<img class="overlay-cover" src="' + issue.cover + '" referrerpolicy="no-referrer">'
        : '';

      let sourcesHtml = '';
      if (issue.sources && issue.sources.length) {
        sourcesHtml = '<div class="overlay-sources"><div class="overlay-sources-label">' +
          i18n[currentLang].sources + '</div>' +
          issue.sources.map(s => {
            const title = getField(s.title) || getDomain(s.url);
            const imgHtml = s.image
              ? '<img class="source-img" src="' + s.image + '" referrerpolicy="no-referrer" loading="lazy">'
              : '';
            return '<a class="source-card" href="' + s.url + '" target="_blank" rel="noopener">' +
              imgHtml +
              '<div><div class="source-title">' + title + '</div>' +
              '<div class="source-domain">' + getDomain(s.url) + '</div></div></a>';
          }).join('') + '</div>';
      }

      document.getElementById('overlay-card').innerHTML =
        '<div class="overlay-close"><button onclick="closeOverlay()">Close</button></div>' +
        '<div class="overlay-header">' +
          '<div class="card-meta">' +
            '<span class="card-date">' + issue.date + '</span>' +
            '<span class="card-tag ' + sec + '">' + sec + '</span>' +
          '</div>' +
          '<h2 class="overlay-title">' + getField(issue.title) + '</h2>' +
        '</div>' +
        coverHtml +
        '<div class="overlay-body">' + getField(issue.content) + '</div>' +
        sourcesHtml;

      document.getElementById('overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

    function render() {
      const c = document.getElementById('cards');
      const filtered = currentSection === 'all'
        ? issuesData
        : issuesData.filter(i => i.section === currentSection);

      if (!filtered.length) {
        c.innerHTML = '<div style="padding:80px;text-align:center;color:var(--text-dim);width:100%">' +
          '<div style="font-size:2rem;margin-bottom:12px">🔍</div>' +
          (currentLang === 'zh' ? '暂无内容' : 'Nothing yet') + '</div>';
        return;
      }

      c.innerHTML = filtered.map((issue, idx) => {
        const realIdx = issuesData.indexOf(issue);
        const sec = issue.section || 'design';
        const w = widths[idx % widths.length];
        const hasCover = !!issue.cover;
        const content = getField(issue.content);
        const excerpt = getExcerpt(content);

        const imgHtml = hasCover
          ? '<div class="card-img-wrap"><img class="card-img" src="' + issue.cover + '" referrerpolicy="no-referrer" loading="lazy"></div>'
          : '';

        const cardClass = hasCover ? 'card card--media' : 'card card--text';

        return '<div class="' + cardClass + '" style="width:' + w + '" onclick="openOverlay(' + realIdx + ')">' +
          '<div class="card-label">' +
            '<div class="card-meta">' +
              '<span class="card-date">' + issue.date + '</span>' +
              '<span class="card-tag ' + sec + '">' + sec + '</span>' +
            '</div>' +
            getField(issue.title) +
          '</div>' +
          '<div class="card-content">' +
            imgHtml +
            (hasCover ? '' : '<div class="card-excerpt">' + excerpt + '</div>') +
            '<div class="card-preview">' + i18n[currentLang].expand + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    async function loadIssues() {
      try {
        const r = await fetch('issues.json');
        if (!r.ok) return;
        issuesData = await r.json();
        setSection(currentSection);
        setLang(currentLang);
      } catch(e) {}
    }

    document.querySelectorAll('[data-lang]').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === currentLang));
    document.querySelectorAll('#section-toggle .menu-link').forEach(b =>
      b.classList.toggle('active', b.dataset.section === currentSection));
    loadIssues();
  </script>
</body>
</html>
