<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Daily — AI × Design Industry Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-card-hover: #1a1a1a;
      --text: #e8e8e8;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #e8c547;
      --accent-dim: rgba(232, 197, 71, 0.15);
      --border: #222;
      --font-display: 'Playfair Display', 'Noto Serif SC', serif;
      --font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 0;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      text-align: left;
    }

    .masthead {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .masthead span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Language Toggle */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--border);
      border-radius: 2rem;
      padding: 3px;
      flex-shrink: 0;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 600;
    }

    .lang-btn:hover:not(.active) {
      color: var(--text-muted);
    }

    /* Main */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Issue Card */
    .issue {
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .issue:first-child {
      padding-top: 0;
    }

    .issue-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .issue-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .issue-summary {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.8;
      display: none;
    }

    .issue.open .issue-summary {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .issue-summary h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--text);
      margin: 1.5rem 0 0.75rem;
      font-weight: 700;
    }

    .issue-summary h3:first-child {
      margin-top: 0.5rem;
    }

    .issue-summary p {
      margin-bottom: 0.75rem;
    }

    .issue-summary ul {
      padding-left: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .issue-summary li {
      margin-bottom: 0.4rem;
    }

    .issue-summary a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .issue-summary a:hover {
      border-bottom-color: var(--accent);
    }

    .issue-summary .rex-take {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      border-radius: 0 0.5rem 0.5rem 0;
    }

    .issue-summary .rex-take h3 {
      color: var(--accent);
      margin-top: 0;
    }

    .issue-preview {
      color: var(--text-dim);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .issue.open .issue-preview {
      display: none;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .issue-title { font-size: 1.25rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .header-inner { flex-direction: column; text-align: center; gap: 1rem; }
      .header-left { text-align: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="masthead">Rex <span>Daily</span></h1>
        <p class="tagline" id="tagline">AI × 设计行业情报</p>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <main class="main" id="issues">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <p>第一期日报即将上线<br>每天早上 9:00 更新</p>
    </div>
  </main>

  <footer class="footer">
    <p id="footer-text">Rex Daily — Wayne 的 AI 设计行业研究助手</p>
  </footer>

  <script>
    let currentLang = localStorage.getItem('rex-lang') || 'zh';
    let issuesData = [];

    const i18n = {
      zh: {
        tagline: 'AI × 设计行业情报',
        footer: 'Rex Daily — Wayne 的 AI 设计行业研究助手',
        expand: '点击展开阅读 →'
      },
      en: {
        tagline: 'AI × Design Industry Intelligence',
        footer: 'Rex Daily — AI Design Industry Research by Rex',
        expand: 'Click to expand →'
      }
    };

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('rex-lang', lang);
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('tagline').textContent = i18n[lang].tagline;
      document.getElementById('footer-text').textContent = i18n[lang].footer;
      renderIssues();
    }

    function getField(field) {
      if (typeof field === 'string') return field;
      return field[currentLang] || field['zh'] || field['en'] || '';
    }

    function renderIssues() {
      const container = document.getElementById('issues');
      if (!issuesData.length) return;
      container.innerHTML = issuesData.map((issue, i) => `
        <article class="issue" onclick="this.classList.toggle('open')">
          <div class="issue-date">${issue.date}</div>
          <h2 class="issue-title">${getField(issue.title)}</h2>
          <p class="issue-preview">${i18n[currentLang].expand}</p>
          <div class="issue-summary">${getField(issue.content)}</div>
        </article>
      `).join('');
    }

    async function loadIssues() {
      try {
        const res = await fetch('issues.json');
        if (!res.ok) return;
        issuesData = await res.json();
        setLang(currentLang);
      } catch (e) {}
    }

    // Init
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    loadIssues();
  </script>
</body>
</html>
