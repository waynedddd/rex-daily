<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Daily — AI Industry Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-card-hover: #1a1a1a;
      --text: #e8e8e8;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #e8c547;
      --accent-design: #e8c547;
      --accent-tech: #47b8e8;
      --accent-dim: rgba(232, 197, 71, 0.15);
      --accent-tech-dim: rgba(71, 184, 232, 0.15);
      --border: #222;
      --font-display: 'Playfair Display', 'Noto Serif SC', serif;
      --font-body: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 0;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { text-align: left; }

    .masthead {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .masthead span { color: var(--accent); }

    .tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--border);
      border-radius: 2rem;
      padding: 3px;
    }

    .toggle-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.03em;
    }

    .toggle-btn.active {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 600;
    }

    .toggle-btn.active[data-section="tech"] {
      background: var(--accent-tech);
    }

    .toggle-btn:hover:not(.active) { color: var(--text-muted); }

    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .issue {
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 0;
      transition: all 0.2s ease;
    }

    .issue:first-child { padding-top: 0; }

    .issue-header {
      cursor: pointer;
    }

    .issue-collapse {
      display: none;
      margin-top: 1rem;
      cursor: pointer;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      transition: all 0.2s ease;
    }

    .issue-collapse:hover {
      color: var(--text-muted);
      border-color: var(--text-dim);
    }

    .issue.open .issue-collapse {
      display: inline-block;
    }

    .issue-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .issue-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .issue-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      font-weight: 600;
    }

    .issue-tag.design {
      background: var(--accent-dim);
      color: var(--accent-design);
    }

    .issue-tag.tech {
      background: var(--accent-tech-dim);
      color: var(--accent-tech);
    }

    .issue-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .issue-summary {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.8;
      display: none;
    }

    .issue.open .issue-summary {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .issue-summary h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      color: var(--text);
      margin: 1.5rem 0 0.75rem;
      font-weight: 700;
    }

    .issue-summary h3:first-child { margin-top: 0.5rem; }
    .issue-summary p { margin-bottom: 0.75rem; }
    .issue-summary ul { padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .issue-summary li { margin-bottom: 0.4rem; }

    .issue-summary a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .issue-summary a:hover { border-bottom-color: var(--accent); }

    .issue-summary .rex-take {
      background: var(--accent-dim);
      border-left: 3px solid var(--accent);
      padding: 1rem 1.25rem;
      margin-top: 1.5rem;
      border-radius: 0 0.5rem 0.5rem 0;
    }

    .issue-summary .rex-take h3 {
      color: var(--accent);
      margin-top: 0;
    }

    .issue[data-section="tech"] .issue-date { color: var(--accent-tech); }
    .issue[data-section="tech"] .issue-summary a { color: var(--accent-tech); }
    .issue[data-section="tech"] .issue-summary a:hover { border-bottom-color: var(--accent-tech); }
    .issue[data-section="tech"] .issue-summary .rex-take {
      background: var(--accent-tech-dim);
      border-left-color: var(--accent-tech);
    }
    .issue[data-section="tech"] .issue-summary .rex-take h3 { color: var(--accent-tech); }

    .issue-preview {
      color: var(--text-dim);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .issue.open .issue-preview { display: none; }

    .empty {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    .footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .issue-title { font-size: 1.25rem; }
      .main { padding: 1.5rem 1rem 3rem; }
      .header-inner { flex-direction: column; text-align: center; gap: 1rem; }
      .header-left { text-align: center; }
      .header-controls { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 class="masthead">Rex <span>Daily</span></h1>
        <p class="tagline" id="tagline">AI 行业情报</p>
      </div>
      <div class="header-controls">
        <div class="toggle-group" id="section-toggle">
          <button class="toggle-btn active" data-section="all" onclick="setSection('all')">ALL</button>
          <button class="toggle-btn" data-section="design" onclick="setSection('design')">🎨 Design</button>
          <button class="toggle-btn" data-section="tech" onclick="setSection('tech')">⚡ Tech</button>
        </div>
        <div class="toggle-group">
          <button class="toggle-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
          <button class="toggle-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main" id="issues">
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <p>加载中...</p>
    </div>
  </main>

  <footer class="footer">
    <p id="footer-text">Rex Daily — Wayne 的 AI 行业研究助手</p>
  </footer>

  <script>
    let currentLang = localStorage.getItem('rex-lang') || 'zh';
    let currentSection = localStorage.getItem('rex-section') || 'all';
    let issuesData = [];

    const i18n = {
      zh: {
        tagline: 'AI 行业情报',
        footer: 'Rex Daily — Wayne 的 AI 行业研究助手',
        expand: '点击展开阅读 →',
        collapse: '收起 ↑',
        tagDesign: 'DESIGN',
        tagTech: 'TECH'
      },
      en: {
        tagline: 'AI Industry Intelligence',
        footer: 'Rex Daily — AI Industry Research by Rex',
        expand: 'Click to expand →',
        collapse: 'Collapse ↑',
        tagDesign: 'DESIGN',
        tagTech: 'TECH'
      }
    };

    function setSection(section) {
      currentSection = section;
      localStorage.setItem('rex-section', section);
      document.querySelectorAll('#section-toggle .toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === section);
      });
      renderIssues();
    }

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('rex-lang', lang);
      document.querySelectorAll('[data-lang]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('tagline').textContent = i18n[lang].tagline;
      document.getElementById('footer-text').textContent = i18n[lang].footer;
      renderIssues();
    }

    function getField(field) {
      if (typeof field === 'string') return field;
      return field[currentLang] || field['zh'] || field['en'] || '';
    }

    function renderIssues() {
      const container = document.getElementById('issues');
      const filtered = currentSection === 'all'
        ? issuesData
        : issuesData.filter(i => i.section === currentSection);

      if (!filtered.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>' +
          (currentLang === 'zh' ? '暂无此分类的日报' : 'No issues in this category yet') + '</p></div>';
        return;
      }

      container.innerHTML = filtered.map((issue, i) => `
        <article class="issue" data-section="${issue.section || 'design'}">
          <div class="issue-header" onclick="this.parentElement.classList.toggle('open')">
            <div class="issue-meta">
              <span class="issue-date">${issue.date}</span>
              <span class="issue-tag ${issue.section || 'design'}">${i18n[currentLang]['tag' + (issue.section || 'design').charAt(0).toUpperCase() + (issue.section || 'design').slice(1)]}</span>
            </div>
            <h2 class="issue-title">${getField(issue.title)}</h2>
            <p class="issue-preview">${i18n[currentLang].expand}</p>
          </div>
          <div class="issue-summary">${getField(issue.content)}</div>
          <button class="issue-collapse" onclick="this.parentElement.classList.remove('open')">${i18n[currentLang].collapse}</button>
        </article>
      `).join('');
    }

    async function loadIssues() {
      try {
        const res = await fetch('issues.json');
        if (!res.ok) return;
        issuesData = await res.json();
        setSection(currentSection);
        setLang(currentLang);
      } catch (e) {}
    }

    document.querySelectorAll('[data-lang]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    document.querySelectorAll('#section-toggle .toggle-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.section === currentSection);
    });
    loadIssues();
  </script>
</body>
</html>
