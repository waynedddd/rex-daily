<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Rex Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f0e8;
      font-family: var(--font);
      overflow: hidden;
      overflow-x: hidden;
      height: 100vh;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      pointer-events: none;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topbar > * { pointer-events: auto; }

    .logo {
      font-family: var(--font);
      font-size: 18px;
      letter-spacing: -0.01em;
      opacity: 0.7;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ctrl-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: var(--font);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .ctrl-btn.active {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.3);
    }

    .ctrl-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }

    /* ── 3D Scene ── */
    .scene {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deck {
      position: relative;
      width: 340px;
      height: 480px;
      transform-style: preserve-3d;
    }

    /* ── Card ── */
    .card {
      position: absolute;
      width: 340px;
      height: 480px;
      border-radius: 12px;
      cursor: pointer;
      transform-origin: bottom center;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  opacity 0.4s ease,
                  filter 0.4s ease,
                  box-shadow 0.5s ease;
      will-change: transform, opacity, filter;
      overflow: hidden;
      backface-visibility: hidden;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 28px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(1) saturate(0.75);
      transition: filter 1.5s ease;
    }

    .card:hover .card-title {
      max-height: 14em;
    }

    @media (max-width: 640px) {
      .card:hover .card-title {
        max-height: 3.75em;
      }
    }

    .card:hover .card-bg {
      filter: brightness(1) saturate(0.85);
    }

    /* Fallback gradient when no cover */
    .card-gradient {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    .card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70%;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    }

    .card-meta {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-date {
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.6;
    }

    .card-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 500;
    }

    .card-tag.design { background: rgba(196,168,78,0.3); color: #e8d48a; }
    .card-tag.tech { background: rgba(74,138,158,0.3); color: #8ec8d8; }

    .card-title {
      position: relative;
      z-index: 1;
      font-family: var(--font);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.02em;
      max-height: 3.75em;
      overflow: hidden;
      transition: max-height 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
    }

    .card-overlay {
      transition: opacity 0.5s ease;
    }

    /* Top-right meta (date + tag) */
    .card-top-right {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-top-date {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      opacity: 0.5;
    }

    .card-top-right .card-tag {
      font-size: 9px;
    }

    /* ── Side navigation ── */
    .side-nav {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .side-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.3s;
    }

    .side-nav-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.3);
    }

    .side-nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .side-dots {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
    }

    .side-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.4s;
      cursor: pointer;
    }

    .side-dot.active {
      background: rgba(255,255,255,0.7);
      height: 20px;
      border-radius: 3px;
    }

    /* ── Swipe hint ── */
    .swipe-hint {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.25;
      z-index: 100;
      transition: opacity 0.5s;
    }

    /* ── Expanded overlay ── */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      pointer-events: none;
      transition: background 0.5s ease, backdrop-filter 0.5s ease, -webkit-backdrop-filter 0.5s ease;
    }

    .overlay.open {
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      pointer-events: auto;
    }

    .overlay-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px 60px;
      opacity: 0;
      transform: translateY(60px) scale(0.92);
      transition: opacity 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                  transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      transition-delay: 0.1s;
    }

    .overlay.open .overlay-inner {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Closing animation */
    .overlay.closing {
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
    }

    .overlay.closing .overlay-inner {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      transition-delay: 0s;
    }

    .overlay-close {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: flex-end;
      padding: 16px 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 60%, transparent);
    }

    .overlay-close button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-family: var(--font);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .overlay-close button:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .overlay-cover {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .overlay-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .overlay-title {
      font-family: var(--font);
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 32px;
      color: #f5f0e8;
    }

    .overlay-body {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.9;
      color: rgba(255,255,255,0.65);
    }

    .overlay-body h3 {
      font-family: var(--font);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f5f0e8;
      margin: 2rem 0 0.75rem;
    }

    .overlay-body h3:first-child { margin-top: 0; }
    .overlay-body p { margin-bottom: 0.75rem; }
    .overlay-body ul { padding-left: 1.25rem; margin-bottom: 1rem; }
    .overlay-body li { margin-bottom: 0.5rem; }
    .overlay-body strong { font-weight: 500; color: rgba(255,255,255,0.85); }

    .overlay-body a {
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(255,255,255,0.2);
    }

    .overlay-body a:hover { text-decoration-color: rgba(255,255,255,0.6); }
    .overlay-body small { font-size: 12px; opacity: 0.5; }
    .overlay-body small a { color: rgba(255,255,255,0.5); }

    .overlay-body > img,
    .overlay-body li img,
    .overlay-body p img,
    .overlay-body ul img { display: none; }

    .overlay-body .rex-take {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      margin-top: 2rem;
    }

    .overlay-body .rex-take h3 { color: #e8d48a; margin-top: 0; }

    /* Sources */
    .overlay-sources {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .overlay-sources-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.35;
      margin-bottom: 12px;
    }

    .source-card {
      display: flex;
      gap: 12px;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      align-items: center;
      text-decoration: none !important;
      transition: background 0.3s;
    }

    .source-card:hover { background: rgba(255,255,255,0.06); }

    .source-img {
      width: 64px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      filter: grayscale(60%);
      transition: filter 1s;
    }

    .source-card:hover .source-img { filter: grayscale(0%); }

    .source-title {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .source-domain {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.35;
      margin-top: 2px;
    }

    /* ── Empty state ── */
    .empty {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.3;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .deck { width: calc(100vw - 48px); height: 440px; }
      .card { width: calc(100vw - 48px); height: 440px; }
      .card-inner { padding: 20px; }
      .card-title { font-size: clamp(22px, 6vw, 28px); }

      .topbar {
        padding: 10px 16px;
      }

      .menu-inner { gap: 12px; }

      .logo { font-size: 16px; }

      .controls {
        gap: 6px;
      }

      .ctrl-btn {
        font-size: 10px;
        padding: 5px 10px;
        letter-spacing: 0.08em;
      }

      .side-nav {
        right: 8px;
        gap: 6px;
      }

      .side-nav-btn {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }

      .side-dots { gap: 6px; }

      .overlay-inner { padding: 0 16px 40px; }
      .overlay-title { font-size: clamp(22px, 5vw, 32px); }
      .overlay-body { font-size: 15px; }

      .swipe-hint { bottom: 48px; font-size: 9px; }
    }

    @media (max-width: 380px) {
      .deck { width: calc(100vw - 32px); height: 400px; }
      .card { width: calc(100vw - 32px); height: 400px; }
      .card-title { font-size: 20px; }
      .ctrl-btn { padding: 4px 8px; font-size: 9px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">Rex Daily</div>
    <div class="controls">
      <button class="ctrl-btn active" data-section="all" onclick="setSection('all')">All</button>
      <button class="ctrl-btn" data-section="design" onclick="setSection('design')">Design</button>
      <button class="ctrl-btn" data-section="tech" onclick="setSection('tech')">Tech</button>
      <button class="ctrl-btn" data-lang="true" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="deck" id="deck"></div>
  </div>

  <div class="swipe-hint" id="swipe-hint">← swipe →</div>

  <div class="side-nav" id="side-nav">
    <button class="side-nav-btn" id="btn-prev" onclick="goTo(currentIndex-1)">↑</button>
    <div class="side-dots" id="side-dots"></div>
    <button class="side-nav-btn" id="btn-next" onclick="goTo(currentIndex+1)">↓</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-inner" id="overlay-inner"></div>
  </div>

  <div class="empty" id="empty" style="display:none">
    <div class="empty-icon">🔍</div>
    <div id="empty-text">暂无内容</div>
  </div>

  <script>
    let issuesData = [];
    let filtered = [];
    let currentIndex = 0;
    let currentLang = localStorage.getItem('rex-lang') || 'zh';
    let currentSection = localStorage.getItem('rex-section') || 'all';

    // Color palettes for cards without covers
    const gradients = [
      'linear-gradient(135deg, #3a2a1a 0%, #1a1510 100%)',
      'linear-gradient(135deg, #2a1a1a 0%, #151010 100%)',
      'linear-gradient(135deg, #1a2a2a 0%, #101518 100%)',
      'linear-gradient(135deg, #2a2a1a 0%, #181810 100%)',
      'linear-gradient(135deg, #1a1a2a 0%, #101020 100%)',
      'linear-gradient(135deg, #2a1a2a 0%, #181018 100%)',
    ];

    function getField(f) {
      if (typeof f === 'string') return f;
      return f[currentLang] || f['zh'] || f['en'] || '';
    }

    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return ''; }
    }

    function setSection(s) {
      currentSection = s;
      localStorage.setItem('rex-section', s);
      document.querySelectorAll('[data-section]').forEach(b =>
        b.classList.toggle('active', b.dataset.section === s));
      filterAndRender();
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('rex-lang', currentLang);
      document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      filterAndRender();
    }

    function filterAndRender() {
      filtered = currentSection === 'all'
        ? [...issuesData]
        : issuesData.filter(i => i.section === currentSection);

      if (!filtered.length) {
        document.getElementById('deck').innerHTML = '';
        document.getElementById('nav-dots').innerHTML = '';
        document.getElementById('empty').style.display = 'block';
        document.getElementById('empty-text').textContent = currentLang === 'zh' ? '暂无内容' : 'Nothing yet';
        document.getElementById('swipe-hint').style.display = 'none';
        return;
      }

      document.getElementById('empty').style.display = 'none';
      document.getElementById('swipe-hint').style.display = 'block';
      currentIndex = 0;
      buildCards();
      buildDots();
      layoutCards();
    }

    function buildCards() {
      const deck = document.getElementById('deck');
      deck.innerHTML = filtered.map((issue, i) => {
        const sec = issue.section || 'design';
        const hasCover = !!issue.cover;
        const bgStyle = hasCover
          ? ''
          : `background: ${gradients[i % gradients.length]};`;

        return `<div class="card" data-index="${i}" onclick="openCard(${i})">
          <div class="card-inner">
            ${hasCover ? `<div class="card-bg" style="background-image:url('${issue.cover}')"></div>` : ''}
            ${!hasCover ? `<div class="card-gradient" style="${bgStyle}"></div>` : ''}
            <div class="card-overlay"></div>
            <div class="card-top-right">
              <span class="card-top-date">${issue.date}</span>
              <span class="card-tag ${sec}">${sec}</span>
            </div>
            <div class="card-title">${getField(issue.title)}</div>
          </div>
        </div>`;
      }).join('');
    }

    function buildDots() {
      const dots = document.getElementById('side-dots');
      dots.innerHTML = filtered.map((_, i) =>
        `<div class="side-dot ${i === 0 ? 'active' : ''}" onclick="goTo(${i})"></div>`
      ).join('');
    }

    function layoutCards() {
      const cards = document.querySelectorAll('.card');
      cards.forEach((card, i) => {
        const offset = i - currentIndex;

        // Show cards in range [-2, 5]
        if (offset < -2 || offset > 5) {
          card.style.opacity = '0';
          card.style.pointerEvents = 'none';
          card.style.transform = 'translateX(0) translateY(0) rotate(0) scale(0.7)';
          card.style.filter = 'brightness(0.3)';
          return;
        }

        // S-shaped winding path:
        // Past cards (offset>0): meander from upper-left toward center
        // Future cards (offset<0): meander from center toward lower-right (mirrored)
        const absOff = Math.abs(offset);
        const dir = offset > 0 ? -1 : 1; // past = upper-left (-), future = lower-right (+)
        
        // Winding X: sine wave creates the S-curve lateral movement
        const xWave = Math.sin(absOff * 1.2) * 120;
        const xDrift = absOff * 60 * dir; // gradual drift toward corner
        const x = xWave * dir + xDrift;
        
        // Y: steady progression up (past) or down (future)
        const y = absOff * 80 * dir;
        
        // Rotation follows the S-curve tangent
        const rot = Math.cos(absOff * 1.2) * 5 * dir;
        
        const scale = Math.max(0.65, 1 - absOff * 0.06);
        const brightness = Math.max(0.25, 1 - absOff * 0.2);
        const opacity = Math.max(0, 1 - absOff * 0.2);

        card.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${rot}deg) scale(${scale})`;
        card.style.opacity = opacity;
        card.style.filter = `brightness(${brightness})`;
        card.style.zIndex = 50 - Math.abs(offset) * 5;
        card.style.pointerEvents = offset === 0 ? 'auto' : 'none';
        card.style.boxShadow = offset === 0
          ? '0 30px 80px rgba(0,0,0,0.7)'
          : `0 10px 30px rgba(0,0,0,${0.3 + Math.abs(offset) * 0.1})`;

        // Fade text on non-front cards
        const inner = card.querySelector('.card-inner');
        if (inner) {
          const textEls = inner.querySelectorAll('.card-title, .card-overlay');
          const textOpacity = offset === 0 ? '1' : '0';
          textEls.forEach(el => el.style.opacity = textOpacity);
          // Top-right meta visible on all cards but dimmer on background
          const topRight = card.querySelector('.card-top-right');
          if (topRight) topRight.style.opacity = offset === 0 ? '1' : '0.3';
        }
      });

      // Update side dots + buttons
      document.querySelectorAll('.side-dot').forEach((dot, i) =>
        dot.classList.toggle('active', i === currentIndex));
      document.getElementById('btn-prev').disabled = currentIndex <= 0;
      document.getElementById('btn-next').disabled = currentIndex >= filtered.length - 1;

      // Hide hint after first swipe
      if (currentIndex > 0) {
        document.getElementById('swipe-hint').style.opacity = '0';
      }
    }

    function goTo(idx) {
      currentIndex = Math.max(0, Math.min(filtered.length - 1, idx));
      layoutCards();
    }

    // ── Swipe handling ──
    let startX = 0, startY = 0, isDragging = false;

    document.getElementById('scene').addEventListener('pointerdown', e => {
      if (document.getElementById('overlay').classList.contains('open')) return;
      startX = e.clientX;
      startY = e.clientY;
      isDragging = true;
    });

    document.getElementById('scene').addEventListener('pointermove', e => {
      // could add live drag feedback later
    });

    document.getElementById('scene').addEventListener('pointerup', e => {
      if (!isDragging) return;
      isDragging = false;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const isMobile = window.innerWidth <= 640;

      if (isMobile) {
        // Mobile: vertical swipe (up = next, down = prev)
        if (Math.abs(dy) < 40 || Math.abs(dx) > Math.abs(dy)) return;
        if (dy > 0 && currentIndex < filtered.length - 1) {
          currentIndex++;
          layoutCards();
        } else if (dy < 0 && currentIndex > 0) {
          currentIndex--;
          layoutCards();
        }
      } else {
        // Desktop: horizontal swipe
        if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
        if (dx > 0 && currentIndex < filtered.length - 1) {
          currentIndex++;
          layoutCards();
        } else if (dx < 0 && currentIndex > 0) {
          currentIndex--;
          layoutCards();
        }
      }
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (document.getElementById('overlay').classList.contains('open')) {
        if (e.key === 'Escape') closeOverlay();
        return;
      }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { goTo(currentIndex + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { goTo(currentIndex - 1); }
      else if (e.key === 'Enter') { openCard(currentIndex); }
    });

    // Mouse wheel
    let wheelCooldown = false;
    document.getElementById('scene').addEventListener('wheel', e => {
      if (document.getElementById('overlay').classList.contains('open')) return;
      if (wheelCooldown) return;
      wheelCooldown = true;
      setTimeout(() => wheelCooldown = false, 400);

      if (e.deltaY > 0 || e.deltaX > 0) goTo(currentIndex - 1);
      else goTo(currentIndex + 1);
    }, { passive: true });

    // ── Overlay ──
    function openCard(idx) {
      const issue = filtered[idx];
      if (!issue) return;
      const sec = issue.section || 'design';

      const coverHtml = issue.cover
        ? `<img class="overlay-cover" src="${issue.cover}" referrerpolicy="no-referrer">`
        : '';

      let sourcesHtml = '';
      if (issue.sources && issue.sources.length) {
        const label = currentLang === 'zh' ? '相关来源' : 'Sources';
        sourcesHtml = `<div class="overlay-sources">
          <div class="overlay-sources-label">${label}</div>
          ${issue.sources.map(s => {
            const title = getField(s.title) || getDomain(s.url);
            const imgHtml = s.image
              ? `<img class="source-img" src="${s.image}" referrerpolicy="no-referrer" loading="lazy">`
              : '';
            return `<a class="source-card" href="${s.url}" target="_blank" rel="noopener">
              ${imgHtml}
              <div>
                <div class="source-title">${title}</div>
                <div class="source-domain">${getDomain(s.url)}</div>
              </div>
            </a>`;
          }).join('')}
        </div>`;
      }

      document.getElementById('overlay-inner').innerHTML = `
        <div class="overlay-close"><button onclick="closeOverlay()">✕ ${currentLang === 'zh' ? '关闭' : 'Close'}</button></div>
        ${coverHtml}
        <div class="overlay-meta">
          <span class="card-date">${issue.date}</span>
          <span class="card-tag ${sec}">${sec}</span>
        </div>
        <h1 class="overlay-title">${getField(issue.title)}</h1>
        <div class="overlay-body">${getField(issue.content)}</div>
        ${sourcesHtml}
      `;

      document.getElementById('overlay').classList.add('open');
    }

    function closeOverlay() {
      const overlay = document.getElementById('overlay');
      overlay.classList.add('closing');
      setTimeout(() => {
        overlay.classList.remove('open', 'closing');
        overlay.scrollTop = 0;
      }, 450);
    }

    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('overlay')) closeOverlay();
    });

    // ── Init ──
    async function init() {
      try {
        const r = await fetch('issues.json');
        if (!r.ok) return;
        issuesData = await r.json();
      } catch(e) { return; }

      // Restore state
      document.querySelector('[data-lang]').textContent = currentLang === 'zh' ? 'EN' : '中';
      document.querySelectorAll('[data-section]').forEach(b =>
        b.classList.toggle('active', b.dataset.section === currentSection));

      filterAndRender();
    }

    init();

    // ── Mouse hover to switch cards ──
    document.getElementById('scene').addEventListener('mousemove', function(e) {
      if (document.getElementById('overlay').classList.contains('open')) return;
      if (isDragging) return;
      const scene = document.getElementById('scene');
      const rect = scene.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const dx = e.clientX - centerX;
      const threshold = rect.width * 0.2;

      if (dx < -threshold && currentIndex < filtered.length - 1) {
        goTo(currentIndex + 1);
      } else if (dx > threshold && currentIndex > 0) {
        goTo(currentIndex - 1);
      }
    });

  </script>
</body>
</html>
